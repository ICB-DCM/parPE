# https://github.com/marketplace/actions/publish-docker
name: Deploy to dockerhub
on: [push, workflow_dispatch]
jobs:
  build:
    name: Deploy to dockerhub
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - run: git archive -v -o container/charliecloud/parpe_base/parpe.tar.gz --format=tar.gz HEAD
    - name: Publish to Registry
      uses: elgohr/Publish-Docker-Github-Action@f7aca2fea76a5218f3c76cd5933c3ba1d8008774
      with:
        name: dweindl/parpe
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        workdir: container/charliecloud/parpe_base/
        dockerfile: Dockerfile
        tag_names: true
